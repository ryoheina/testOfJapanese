kind = "web"
previewPath = "/"
title = "Japanese Kana Quiz"
version = "1.0.0"
id = "artifacts/kana-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23396

[services.development]
run = "pnpm --filter @workspace/kana-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kana-quiz", "run", "build" ]
publicDir = "artifacts/kana-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23396"
BASE_PATH = "/"
